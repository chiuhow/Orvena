# Roles & tool boundaries. Each role declares which tools it may use; forbidden
# tools are hard-denied. Tools in v0.1: fs.read, fs.write.

roles:
  - name: developer
    allowed_tools: [fs.read, fs.write]
    forbidden_tools: []
    knowledge_scope: [src, tests]

  - name: reviewer
    allowed_tools: [fs.read]
    forbidden_tools: [fs.write]   # a reviewer never writes
    knowledge_scope: [src, tests]
