name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: build · test · clippy · boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Boundary check (no research leaks)
        run: ./scripts/boundary-check.sh

  install-smoke:
    name: clean-machine install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install the binary from source
        run: cargo install --path crates/orvena-cli --root "$RUNNER_TEMP/orvena-install"
      - name: Binary runs
        run: "$RUNNER_TEMP/orvena-install/bin/orvena --help"
